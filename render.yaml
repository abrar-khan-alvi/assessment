services:
  - type: web
    name: interactive-teaching-platform
    runtime: docker
    plan: free
    region: ohio
    releaseCommand: "python manage.py migrate --noinput && python manage.py seed_data --reset"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: teaching-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: PYTHON_VERSION
        value: 3.12.3

databases:
  - name: teaching-db
    plan: free
    region: ohio
