services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mount source for live-reload during development
      - ./backend:/app
      # Persist SQLite database and uploaded media between restarts
      - db_data:/app/db.sqlite3
      - media_data:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - DEBUG=True
      - DJANGO_SECRET_KEY=docker-dev-secret-key-change-in-production
      # Uncomment below to use PostgreSQL instead of SQLite:
      # - DATABASE_URL=postgres://itp_user:itp_pass@db:5432/itp_db
    # depends_on:
    #   db:
    #     condition: service_healthy

  # Optional PostgreSQL service — uncomment to use
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: itp_db
  #     POSTGRES_USER: itp_user
  #     POSTGRES_PASSWORD: itp_pass
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U itp_user -d itp_db"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

volumes:
  db_data:
  media_data:
  # postgres_data:
